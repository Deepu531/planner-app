<!DOCTYPE html>
<html>
<head>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <title>Planner</title>

  <style>
    body {
      font-family: 'Segoe UI';
      margin: 0;
      background: #0f172a;
      color: #e5e7eb;
    }

    #loginScreen {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #appScreen {
      display: none;
      padding: 10px;
      text-align: center;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: #1e293b;
      color: white;
      cursor: pointer;
    }

    .title {
      font-size: 26px;
      font-weight: bold;
      color: #38bdf8;
      margin: 10px 0;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      max-width: 700px;
      margin: auto;
      align-items: center;
    }

    .search {
      padding: 8px;
      border-radius: 8px;
      border: none;
      width: 200px;
      background: #1e293b;
      color: white;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      max-width: 700px;
      margin: 20px auto;
    }

    .day-name {
      font-weight: bold;
      color: #94a3b8;
      text-align: center;
    }

    .day {
      background: #1e293b;
      border-radius: 12px;
      min-height: 120px;
      padding: 6px;
      text-align: left;
      font-size: 11px;
      cursor: pointer;
    }

    .date-number {
      font-weight: bold;
      color: #e2e8f0;
      margin-bottom: 5px;
    }

    .task {
      font-size: 11px;
      color: #cbd5f5;
      margin: 2px 0;
    }

    .done {
      text-decoration: line-through;
      color: #64748b;
    }

    .inline-input {
      width: 95%;
      margin: 3px 0;
      padding: 5px;
      border-radius: 6px;
      border: none;
      background: #334155;
      color: white;
      font-size: 11px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <button onclick="googleLogin()">Login with Google</button>
</div>

<!-- APP -->
<div id="appScreen">

  <div class="title">🗓️ My Planner</div>

  <div class="top-bar">
    <input id="search" class="search" placeholder="Search tasks..." oninput="renderCalendar()">
    <button onclick="logout()">Logout</button>
  </div>

  <div class="top-bar">
    <button onclick="prevMonth()">⬅️</button>
    <h3 id="monthYear"></h3>
    <button onclick="nextMonth()">➡️</button>
  </div>

  <div id="calendar" class="calendar"></div>
</div>

<script>

firebase.initializeApp({
  apiKey: "AIzaSyCHnF1hZEAC1Hl4IH0RlsLPFw9zYbPTPN4",
  authDomain: "planner-app-cd7ea.firebaseapp.com",
  projectId: "planner-app-cd7ea"
});

const auth = firebase.auth();
const db = firebase.firestore();

let user = null;
let monthData = {};
let activeKey = null;

let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();

const calendar = document.getElementById("calendar");
const monthYear = document.getElementById("monthYear");

const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];


// AUTH
auth.onAuthStateChanged(async (u) => {
  user = u;

  if (user) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("appScreen").style.display = "block";

    await loadData();
    renderCalendar();
  }
});

function googleLogin() {
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

function logout() {
  auth.signOut();
}


// LOAD DATA
async function loadData() {
  monthData = {};

  const snap = await db.collection("tasks")
    .doc(user.uid)
    .collection("dates")
    .get();

  snap.forEach(doc => {
    monthData[doc.id] = doc.data().data;
  });
}


// RENDER (STABLE CORE FIX)
function renderCalendar() {

  calendar.innerHTML = "";
  monthYear.innerText = months[currentMonth] + " " + currentYear;

  const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  days.forEach(d => {
    const div = document.createElement("div");
    div.className = "day-name";
    div.innerText = d;
    calendar.appendChild(div);
  });

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    calendar.appendChild(document.createElement("div"));
  }

  for (let i = 1; i <= totalDays; i++) {

    const key = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;

    const day = document.createElement("div");
    day.className = "day";

    const title = document.createElement("div");
    title.className = "date-number";
    title.innerText = i;
    day.appendChild(title);

    let data = monthData[key] || [];

    const search = document.getElementById("search").value.toLowerCase();

    // VIEW MODE
    if (activeKey !== key) {
      data.forEach(t => {
        if (t.text?.toLowerCase().includes(search)) {
          const div = document.createElement("div");
          div.className = "task";
          if (t.done) div.classList.add("done");
          div.innerText = t.text;
          day.appendChild(div);
        }
      });
    }

    // CLICK TOGGLE
    day.onclick = () => {
      activeKey = (activeKey === key) ? null : key;
      renderCalendar();
    };

    // EDIT MODE (SAFE COPY BUFFER)
    if (activeKey === key) {

      let buffer = JSON.parse(JSON.stringify(monthData[key] || []));

      while (buffer.length < 5) {
        buffer.push({ text: "", done: false });
      }

      buffer.slice(0,5).forEach((t, idx) => {

        const input = document.createElement("input");
        input.className = "inline-input";
        input.value = t.text;

        input.oninput = (e) => {
          buffer[idx].text = e.target.value;
          monthData[key] = buffer; // LIVE SYNC (IMPORTANT FIX)
        };

        day.appendChild(input);
      });

      const saveBtn = document.createElement("button");
      saveBtn.innerText = "Save";

      saveBtn.onclick = async (e) => {
        e.stopPropagation();

        const cleaned = (monthData[key] || []).filter(t => t.text.trim());

        await db.collection("tasks")
          .doc(user.uid)
          .collection("dates")
          .doc(key)
          .set({ data: cleaned });

        monthData[key] = cleaned;
        activeKey = null;

        renderCalendar();
      };

      day.appendChild(saveBtn);
    }

    calendar.appendChild(day);
  }
}


// MONTH CHANGE
function nextMonth() {
  currentMonth++;
  if (currentMonth > 11) {
    currentMonth = 0;
    currentYear++;
  }
  loadData().then(renderCalendar);
}

function prevMonth() {
  currentMonth--;
  if (currentMonth < 0) {
    currentMonth = 11;
    currentYear--;
  }
  loadData().then(renderCalendar);
}

</script>

</body>
</html>
