<!DOCTYPE html>
<html>
<head>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <title>My Planner</title>

  <style>
    body {
      font-family: 'Segoe UI';
      background: #0f172a;
      color: #e5e7eb;
      text-align: center;
      margin: 0;
    }

    h2 { color: #38bdf8; }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: #1e293b;
      color: #e5e7eb;
      cursor: pointer;
      margin: 5px;
    }

    button:hover { background: #334155; }

    /* LOGIN SCREEN */
    #loginScreen {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* APP SCREEN */
    #appScreen {
      display: none;
      padding: 10px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 700px;
      margin: auto;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      max-width: 700px;
      margin: 20px auto;
    }

    .day-name {
      font-weight: bold;
      color: #94a3b8;
    }

    .day {
      background: #1e293b;
      border-radius: 12px;
      min-height: 120px;
      padding: 6px;
      text-align: left;
      cursor: pointer;
      font-size: 11px;
    }

    .expanded {
      grid-column: span 2;
      min-height: 220px;
    }

    .date-number {
      font-weight: bold;
      color: #e2e8f0;
    }

    .inline-input {
      width: 95%;
      margin: 3px 0;
      padding: 5px;
      border-radius: 6px;
      border: none;
      background: #334155;
      color: white;
      font-size: 11px;
    }
  </style>
</head>

<body>

<!-- 🔐 LOGIN SCREEN -->
<div id="loginScreen">
  <h2>🗓️ My Planner</h2>
  <button onclick="googleLogin()">Login with Google</button>
</div>

<!-- 📅 APP SCREEN -->
<div id="appScreen">

  <div class="top-bar">
    <h3 id="monthYear"></h3>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="calendar" id="calendar"></div>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCHnF1hZEAC1Hl4IH0RlsLPFw9zYbPTPN4",
  authDomain: "planner-app-cd7ea.firebaseapp.com",
  projectId: "planner-app-cd7ea",
  storageBucket: "planner-app-cd7ea.firebasestorage.app",
  messagingSenderId: "128214928364",
  appId: "1:128214928364:web:ddf59a06e5da63f2450ec9"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let user = null;
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();
let expandedDay = null;

const loginScreen = document.getElementById("loginScreen");
const appScreen = document.getElementById("appScreen");
const calendar = document.getElementById("calendar");
const monthYear = document.getElementById("monthYear");

const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];


// 🔐 AUTH STATE CONTROL (IMPORTANT PART)
auth.onAuthStateChanged(async (u) => {
  user = u;

  if (user) {
    loginScreen.style.display = "none";
    appScreen.style.display = "block";
    loadCalendar();
  } else {
    loginScreen.style.display = "flex";
    appScreen.style.display = "none";
  }
});


// 🔑 LOGIN
function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .catch(() => auth.signInWithRedirect(provider));
}


// 🚪 LOGOUT
function logout() {
  auth.signOut();
}


// 📅 CALENDAR
async function loadCalendar() {

  calendar.innerHTML = "";
  monthYear.innerText = months[currentMonth] + " " + currentYear;

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();

  const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  days.forEach(d => {
    const div = document.createElement("div");
    div.className = "day-name";
    div.innerText = d;
    calendar.appendChild(div);
  });

  for (let i=0;i<firstDay;i++) {
    calendar.appendChild(document.createElement("div"));
  }

  for (let i=1;i<=totalDays;i++) {

    const key = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;

    const day = document.createElement("div");
    day.className = "day";

    if (expandedDay === i) day.classList.add("expanded");

    day.onclick = () => {
      expandedDay = expandedDay === i ? null : i;
      loadCalendar();
    };

    const dateNum = document.createElement("div");
    dateNum.innerText = i;
    dateNum.className = "date-number";
    day.appendChild(dateNum);

    let data = [];

    if (user) {
      const doc = await db.collection("tasks")
        .doc(user.uid)
        .collection("dates")
        .doc(key)
        .get();

      if (doc.exists) {
        data = doc.data().data;
      }
    }

    if (expandedDay === i) {

      while (data.length < 5) data.push({text:"", done:false});

      data.forEach((task, index) => {
        const input = document.createElement("input");
        input.className = "inline-input";
        input.value = task.text;

        input.oninput = (e) => {
          data[index].text = e.target.value;
        };

        day.appendChild(input);
      });

      const saveBtn = document.createElement("button");
      saveBtn.innerText = "Save";

      saveBtn.onclick = async (e) => {
        e.stopPropagation();

        await db.collection("tasks")
          .doc(user.uid)
          .collection("dates")
          .doc(key)
          .set({ data });

        expandedDay = null;
        loadCalendar();
      };

      day.appendChild(saveBtn);
    }

    calendar.appendChild(day);
  }
}


// NAV (optional if you had earlier)
function nextMonth() {
  currentMonth++;
  if (currentMonth > 11) {
    currentMonth = 0;
    currentYear++;
  }
  loadCalendar();
}

function prevMonth() {
  currentMonth--;
  if (currentMonth < 0) {
    currentMonth = 11;
    currentYear--;
  }
  loadCalendar();
}

</script>

</body>
</html>
