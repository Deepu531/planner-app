<!DOCTYPE html>
<html>
<head>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <title>Planner</title>

  <style>
    body {
      font-family: 'Segoe UI';
      margin: 0;
      background: #0f172a;
      color: #e5e7eb;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: #1e293b;
      color: white;
      cursor: pointer;
    }

    button:hover { background: #334155; }

    #loginScreen {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #loginBtn {
      font-size: 20px;
      padding: 16px 28px;
      border-radius: 14px;
    }

    #appScreen {
      display: none;
      text-align: center;
      padding: 10px;
    }

    .title {
      font-size: 26px;
      font-weight: bold;
      color: #38bdf8;
      margin: 10px 0;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      max-width: 700px;
      margin: auto;
      align-items: center;
    }

    .search {
      padding: 8px;
      border-radius: 8px;
      border: none;
      width: 200px;
      background: #1e293b;
      color: white;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      max-width: 700px;
      margin: 20px auto;
    }

    .day-name {
      font-weight: bold;
      color: #94a3b8;
    }

    .day {
      background: #1e293b;
      border-radius: 12px;
      min-height: 120px;
      padding: 6px;
      text-align: left;
      font-size: 11px;
      cursor: pointer;
    }

    .date-number {
      font-weight: bold;
      color: #e2e8f0;
      margin-bottom: 5px;
    }

    .task {
      font-size: 11px;
      color: #cbd5f5;
      margin: 2px 0;
      word-break: break-word;
    }

    .done {
      text-decoration: line-through;
      color: #64748b;
    }

    .inline-input {
      width: 95%;
      margin: 3px 0;
      padding: 5px;
      border-radius: 6px;
      border: none;
      background: #334155;
      color: white;
      font-size: 11px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <button id="loginBtn" onclick="googleLogin()">Login with Google</button>
</div>

<!-- APP -->
<div id="appScreen">

  <div class="title">🗓️ My Planner</div>

  <div class="top-bar">
    <input id="search" class="search" placeholder="Search tasks..." oninput="renderCalendar()">
    <button onclick="logout()">Logout</button>
  </div>

  <div class="top-bar">
    <button onclick="prevMonth()">⬅️</button>
    <h3 id="monthYear"></h3>
    <button onclick="nextMonth()">➡️</button>
  </div>

  <div id="calendar" class="calendar"></div>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCHnF1hZEAC1Hl4IH0RlsLPFw9zYbPTPN4",
  authDomain: "planner-app-cd7ea.firebaseapp.com",
  projectId: "planner-app-cd7ea",
  storageBucket: "planner-app-cd7ea.firebasestorage.app",
  messagingSenderId: "128214928364",
  appId: "1:128214928364:web:ddf59a06e5da63f2450ec9"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let user = null;
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();

let expandedDay = null;

// cache
let monthData = {};

// 🔥 FIX: temporary edit storage (MOST IMPORTANT)
let editBuffer = {};

const loginScreen = document.getElementById("loginScreen");
const appScreen = document.getElementById("appScreen");
const calendar = document.getElementById("calendar");
const monthYear = document.getElementById("monthYear");

const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];


// AUTH
auth.onAuthStateChanged(async (u) => {
  user = u;

  if (user) {
    loginScreen.style.display = "none";
    appScreen.style.display = "block";

    await loadMonthData();
    renderCalendar();
  } else {
    loginScreen.style.display = "flex";
    appScreen.style.display = "none";
  }
});


// LOGIN
function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
    .catch(() => auth.signInWithRedirect(provider));
}


// LOGOUT
function logout() {
  auth.signOut();
}


// LOAD ALL DATA ONCE
async function loadMonthData() {
  monthData = {};

  if (!user) return;

  const snap = await db.collection("tasks")
    .doc(user.uid)
    .collection("dates")
    .get();

  snap.forEach(doc => {
    monthData[doc.id] = doc.data().data;
  });
}


// RENDER CALENDAR
function renderCalendar() {

  calendar.innerHTML = "";
  monthYear.innerText = months[currentMonth] + " " + currentYear;

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();

  const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  days.forEach(d => {
    const div = document.createElement("div");
    div.className = "day-name";
    div.innerText = d;
    calendar.appendChild(div);
  });

  for (let i=0;i<firstDay;i++) {
    calendar.appendChild(document.createElement("div"));
  }

  for (let i=1;i<=totalDays;i++) {

    const key = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;

    const day = document.createElement("div");
    day.className = "day";

    const dateNum = document.createElement("div");
    dateNum.className = "date-number";
    dateNum.innerText = i;
    day.appendChild(dateNum);

    const search = document.getElementById("search").value.toLowerCase();

    let data = monthData[key] || [];

    // VIEW MODE
    if (expandedDay !== i) {

      data.forEach(task => {
        if (task.text && task.text.toLowerCase().includes(search)) {

          const div = document.createElement("div");
          div.className = "task";

          if (task.done) div.classList.add("done");

          div.innerText = task.text;

          day.appendChild(div);
        }
      });
    }

    // CLICK TO EDIT (IMPORTANT FIX)
    day.onclick = () => {

      if (expandedDay !== i) {
        expandedDay = i;
        editBuffer[key] = JSON.parse(JSON.stringify(monthData[key] || []));
      } else {
        expandedDay = null;
      }

      renderCalendar();
    };

    // EDIT MODE (FIXED STABLE)
    if (expandedDay === i) {

      let editData = editBuffer[key] || [];

      while (editData.length < 5) {
        editData.push({ text: "", done: false });
      }

      editData = editData.slice(0, 5);

      editBuffer[key] = editData;

      editData.forEach((task, index) => {

        const input = document.createElement("input");
        input.className = "inline-input";
        input.value = task.text || "";

        input.oninput = (e) => {
          editBuffer[key][index].text = e.target.value;
        };

        day.appendChild(input);
      });

      const saveBtn = document.createElement("button");
      saveBtn.innerText = "Save";

      saveBtn.onclick = async (e) => {
        e.stopPropagation();

        const cleaned = editBuffer[key].filter(t => t.text.trim() !== "");

        await db.collection("tasks")
          .doc(user.uid)
          .collection("dates")
          .doc(key)
          .set({ data: cleaned });

        monthData[key] = cleaned;

        expandedDay = null;
        renderCalendar();
      };

      day.appendChild(saveBtn);
    }

    calendar.appendChild(day);
  }
}


// NAV
function nextMonth() {
  currentMonth++;
  if (currentMonth > 11) {
    currentMonth = 0;
    currentYear++;
  }
  loadMonthData().then(renderCalendar);
}

function prevMonth() {
  currentMonth--;
  if (currentMonth < 0) {
    currentMonth = 11;
    currentYear--;
  }
  loadMonthData().then(renderCalendar);
}

</script>

</body>
</html>
